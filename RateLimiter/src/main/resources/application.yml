spring:
  application:
    name: rate-limiter

rate-limiter:
  store-type: in-memory   # Options: in-memory | redis

server:
  port: 8080

logging:
  level:
    com.ratelimiter.resolver: DEBUG
    com.ratelimiter.filter: DEBUG
    com.ratelimiter.rule: DEBUG
    com.ratelimiter.api: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false   # Redis health managed by our own isHealthy(); avoids false DOWN when store-type=in-memory
